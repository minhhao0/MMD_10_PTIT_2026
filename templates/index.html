<!DOCTYPE html>
<html>
<head>
    <title>AQI Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container text-center mt-5">

    <h1 class="text-primary">🌍 AQI 24h Prediction</h1>

    <div class="card p-4 mt-4 shadow">

        <form action="/predict">

            <div class="row">

                <div class="col-md-6">
                    <select name="city" id="city" class="form-control">
                        <option>Chọn tỉnh</option>
                        {% for c in cities %}
                        <option value="{{c}}">{{c}}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <select name="district" id="district" class="form-control"></select>
                </div>

            </div>

            <button class="btn btn-primary mt-3">Dự đoán</button>

        </form>

    </div>

</div>

<script>
document.getElementById("city").addEventListener("change", function(){
    let city = this.value;

    fetch(`/get_districts?city=${city}`)
    .then(res => res.json())
    .then(data => {
        let district = document.getElementById("district");
        district.innerHTML = "";

        data.districts.forEach(d => {
            let opt = document.createElement("option");
            opt.value = d;
            opt.innerHTML = d;
            district.appendChild(opt);
        });
    });
});
</script>

</body>
</html>
