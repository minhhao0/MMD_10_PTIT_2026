<!DOCTYPE html>
<html>
<head>
    <title>Dự đoán AQI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 text-center">

    <div class="card shadow p-4">

        <h2>📅 Dự đoán AQI 3 ngày tới</h2>

        <table class="table table-hover mt-4">
            <thead class="table-dark">
                <tr>
                    <th>Ngày</th>
                    <th>AQI</th>
                    <th>Đánh giá</th>
                </tr>
            </thead>

            <tbody>
                {% for item in results %}
                <tr>
                    <td>{{ item.date }}</td>
                    <td>{{ item.aqi }}</td>
                    <td>
                        <span class="badge bg-{{ item.color }}">
                            {{ item.level }}
                        </span>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <a href="/" class="btn btn-primary">⬅ Quay lại</a>

    </div>

</div>

</body>
</html>
